<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="com.cyanskillfish.Governor"/>
    <allow send_destination="com.cyanskillfish.Governor"
           send_interface="com.cyanskillfish.Governor.PerformanceMode"/>
    <allow send_destination="com.cyanskillfish.Governor"
           send_interface="com.cyanskillfish.Governor.TestMode"/>
    <allow send_destination="com.cyanskillfish.Governor"
           send_interface="org.freedesktop.DBus.Properties"/>
  </policy>

  <!-- Performance Mode is available to local authenticated users. -->
  <policy context="default">
    <allow send_destination="com.cyanskillfish.Governor"
           send_interface="com.cyanskillfish.Governor.PerformanceMode"/>
    <allow send_destination="com.cyanskillfish.Governor"
           send_interface="org.freedesktop.DBus.Properties"/>
    <deny send_destination="com.cyanskillfish.Governor"
          send_interface="com.cyanskillfish.Governor.TestMode"/>
  </policy>
</busconfig>
