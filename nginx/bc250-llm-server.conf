# Fedora's nginx package includes files from /etc/nginx/default.d/ inside its
# default HTTP server. This testing package deliberately provides HTTP only.
# See /usr/share/doc/bc250-llm-server/HTTPS.md before wider use.
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;
    proxy_buffering off;
    client_max_body_size 256m;
}
