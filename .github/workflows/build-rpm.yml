name: Build Fedora RPM

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:44

    steps:
      - name: Install build tools
        run: |
          dnf install -y \
            bash cargo curl findutils gcc git gzip make \
            libdrm-devel patch python3 rpm-build rust \
            systemd systemd-rpm-macros tar xz

      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Build RPMs
        run: make rpm

      - name: Upload binary RPM
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: bc250-llm-server-binary-rpm
          path: |
            dist/RPMS/*.x86_64.rpm
            dist/SHA256SUMS

      - name: Upload source RPM
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: bc250-llm-server-source-rpm
          path: |
            dist/SRPMS/*.src.rpm
            dist/SHA256SUMS
